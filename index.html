<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesadelo no Breu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #020202;
            color: #8b0000;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        #canvasContainer {
            position: relative;
            box-shadow: 0 0 30px rgba(139, 0, 0, 0.2);
        }
        canvas {
            border: 3px solid #300;
            background-color: #000;
            cursor: none;
        }
        #hud {
            margin-bottom: 15px;
            font-size: 16px;
            text-align: center;
            font-weight: bold;
            min-height: 20px;
        }
        #btnAudio {
            background: #400;
            color: #fff;
            border: 1px solid #600;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 15px;
            transition: 0.3s;
        }
        #btnAudio:hover {
            background: #600;
        }
    </style>
</head>
