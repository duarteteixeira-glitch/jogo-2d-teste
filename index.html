<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo de Tiro Espacial</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #111;
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        canvas {
            border: 4px solid #333;
            background-color: #050510;
        }
        #hud {
            margin-bottom: 10px;
            font-size: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="hud">Pontuação: 0</div>
    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const hud = document.getElementById("hud");

        let score = 0;
        let gameOver = false;
        let keys = {};

        // Jogador (Nave)
        const player = {
            x: canvas.width / 2 - 20,
            y: canvas.height - 60,
            width: 40,
            height: 40,
            speed: 6,
            cooldown: 0
        };

        // Listas de objetos
        let bullets = [];
        let enemies = [];

        // Controles
        window.addEventListener("keydown", (e) => keys[e.key.toLowerCase()] = true);
        window.addEventListener("keyup", (e) => keys[e.key.toLowerCase()] = false);

        // Criar inimigos aleatórios
        function spawnEnemy() {
            if (gameOver) return;
            const size = Math.random() * 30 + 20;
            enemies.push({
                x: Math.random() * (canvas.width - size),
                y: -size,
                width: size,
                height: size,
                speed: Math.random() * 2 + 2
            });
            // Agenda o próximo inimigo
            setTimeout(spawnEnemy, Math.random() * 1000 + 500);
        }

        // Detectar colisão entre dois retângulos
        function rectCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }

        // Atualizar lógica do jogo
        function update() {
            if (gameOver) return;

            // Movimento do jogador
            if (keys["arrowleft"] || keys["a"]) player.x -= player.speed;
            if (keys["arrowright"] || keys["d"]) player.x += player.speed;

            // Limites da tela para o jogador
            player.x = Math.max(0, Math.min(canvas.width - player.width, player.x));

            // Sistema de Tiro (Barra de espaço)
            if (player.cooldown > 0) player.cooldown--;
            if ((keys[" "] || keys["spacebar"]) && player.cooldown === 0) {
                bullets.push({
                    x: player.x + player.width / 2 - 4,
                    y: player.y,
                    width: 8,
                    height: 15,
                    speed: 8
                });
                player.cooldown = 15; // Tempo entre um tiro e outro
            }

            // Atualizar tiros
            bullets.forEach((bullet, index) => {
                bullet.y -= bullet.speed;
                // Remover tiros que saem da tela
                if (bullet.y < 0) bullets.splice(index, 1);
            });

            // Atualizar inimigos
            enemies.forEach((enemy, eIndex) => {
                enemy.y += enemy.speed;

                // Game Over se o inimigo tocar o chão ou bater no jogador
                if (enemy.y > canvas.height || rectCollision(player, enemy)) {
                    gameOver = true;
                }

                // Checar se algum tiro acertou o inimigo
                bullets.forEach((bullet, bIndex) => {
                    if (rectCollision(bullet, enemy)) {
                        enemies.splice(eIndex, 1);
                        bullets.splice(bIndex, 1);
                        score += 10;
                        hud.innerText = "Pontuação: " + score;
                    }
                });
            });
        }

        // Desenhar elementos na tela
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (gameOver) {
                ctx.fillStyle = "white";
                ctx.font = "40px sans-serif";
                ctx.textAlign = "center";
                ctx.fillText("FIM DE JOGO", canvas.width / 2, canvas.height / 2);
                ctx.font = "20px sans-serif";
                ctx.fillText("Pressione F5 para reiniciar", canvas.width / 2, canvas.height / 2 + 40);
                return;
            }

            // Desenhar jogador (Nave azul)
            ctx.fillStyle = "#00aaff";
            ctx.fillRect(player.x, player.y, player.width, player.height);

            // Desenhar tiros (Lasers vermelhos)
            ctx.fillStyle = "#ff3333";
            bullets.forEach(bullet => {
                ctx.fillRect(bullet.x, bullet.y, bullet.width, bullet.height);
            });

            // Desenhar inimigos (Quadrados roxos)
            ctx.fillStyle = "#aa00ff";
            enemies.forEach(enemy => {
                ctx.fillRect(enemy.x, enemy.y, enemy.width, enemy.height);
            });
        }

        // Loop principal
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Iniciar
        spawnEnemy();
        gameLoop();
    </script>
</body>
</html>
